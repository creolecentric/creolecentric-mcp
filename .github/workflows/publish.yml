name: Publish to PyPI

# Triggered by any v* tag. The build job classifies the tag as a final
# release or pre-release using PEP 440, then routes to the right registry:
#   - final releases (v1.2.3)            → PyPI, gated by the `pypi` environment
#   - pre-releases   (v1.2.3rc1, a1, b1) → TestPyPI, no gate
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}
      version:       ${{ steps.classify.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build packaging

      - name: Build distributions
        run: python -m build

      - name: Verify tag matches pyproject.toml and classify pre-release
        id: classify
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          python <<'PYEOF'
          import os, pathlib, sys, tomllib
          from packaging.version import Version

          tag_str = os.environ["TAG_REF"].lstrip("v")
          pkg_str = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          tag = Version(tag_str)
          pkg = Version(pkg_str)
          if tag != pkg:
              print(f"::error::Tag version ({tag}) does not match pyproject.toml version ({pkg}).")
              sys.exit(1)
          flag = "true" if pkg.is_prerelease else "false"
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"version={pkg}\n")
              fh.write(f"is_prerelease={flag}\n")
          print(f"Resolved version={pkg}, is_prerelease={flag}")
          PYEOF

      - name: Upload built distributions as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI (production)
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.build.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/creolecentric-mcp/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write  # Required for PyPI trusted publishing (OIDC).
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI (pre-release)
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      needs.build.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/creolecentric-mcp/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
