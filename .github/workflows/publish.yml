name: Publish to PyPI

# Triggers on any annotated tag matching v0.1.0, v1.2.3, etc.
# To cut a release:
#   git tag -a v0.1.0 -m "v0.1.0"
#   git push origin v0.1.0
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:  # Allow manual runs from the Actions tab.

permissions:
  contents: read

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Verify package version matches the tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(python -c 'import tomllib,pathlib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match pyproject.toml version ($pkg_version)."
            exit 1
          fi

      - name: Upload built distributions as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only publish on tag pushes, never on workflow_dispatch from a branch.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # Required for PyPI trusted publishing (OIDC).
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
